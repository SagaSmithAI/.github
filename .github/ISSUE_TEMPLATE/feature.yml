name: Feature proposal
description: Propose a scoped platform capability
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Player, GM, creator, or integrator problem
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Proposed ownership and rule boundary
      description: State which repository owns it and what remains GM judgment.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Observable acceptance criteria
    validations:
      required: true
